# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: EOC.online
email:
description: >- # this means to ignore newlines until "baseurl:"
  EOC.online provides open-source tools for Emergency Operations Centers, wildland
  firefighters, & local CERT/VOAD/Citizen Corps groups.
twitter_username: username
github_username: eoconline
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
#remote_theme: "mmistakes/minimal-mistakes@4.24.0"
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: America/Los_Angeles # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "EOC.online"
  avatar: "/assets/images/eoconline_logo500.png"
  bio:
    "EOC.online provides open-source tooling for Emergency Operation Centerse and disaster
    preparedness groups."
  links:
    - label: "EOC.online"
      icon: "fas fa-fw fa-link"
      url: "https://EOC.online"
    - label: "Our Jekyl Pages"
      icon: "fab fa-fw fa-github"
      url: "https://eoconline.github.io/"
    - label: "Our GitHub Repositories"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/eoconline/"
    - label: "RangerTrak"
      icon: "fas fa-fw fa-link"
      url: "https://RangerTrak.org"
    - label: "OpenFemaNgClient"
      icon: "fas fa-fw fa-link"
      url: "https://eocsw.org/"

footer:
  links:
    - label: "EOC.online"
      icon: "fas fa-fw fa-link"
      url: "https://EOC.online"
    - label: "GitHub Jekyl Pages"
      icon: "fab fa-fw fa-github"
      url: "https://eoconline.github.io/"
    - label: "GitHub Repositories"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/eoconline/"
    - label: "RangerTrak"
      icon: "fas fa-fw fa-link"
      url: "https://RangerTrak.org"
    - label: "OpenFemaNgClient"
      icon: "fas fa-fw fa-link"
      url: "https://eocsw.org/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
